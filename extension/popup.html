<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>YouTube AI Chat</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

<div class="container">

    <h2>YouTube AI Chat</h2>

    <div class="video-card">

        <h3 id="videoTitle">
            Loading...
        </h3>

        <p id="videoId">
            Detecting current video...
        </p>

    </div>

    <button id="loadVideo">
        Load Transcript
    </button>

    <div id="status" class="status">
        Ready
    </div>

    <div id="chatBox"></div>

    <div class="bottom">

        <input
            id="question"
            type="text"
            placeholder="Ask anything about this video">

        <button id="ask">
            Send
        </button>

    </div>

</div>

<script src="popup.js"></script>

</body>
</html>
